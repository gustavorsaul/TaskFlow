<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #e5e5e5;
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 250px;
      background-color: #fff;
      border-right: 1px solid #ccc;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      margin-bottom: 15px;
      font-size: 18px;
    }

    .task-list {
      flex: 1;
      overflow-y: auto;
    }

    .task-item {
      padding: 10px;
      margin-bottom: 5px;
      background-color: #f5f5f5;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .task-item:hover {
      background-color: #e9e9e9;
    }

    .task-item.active {
      background-color: #dcdcdc;
      font-weight: bold;
    }

    .new-task-btn {
      margin-top: 10px;
      padding: 10px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }

    .new-task-btn:hover {
      background-color: #0069d9;
    }

    .main {
      flex: 1;
      background-color: #fff;
      padding: 30px;
      display: flex;
      flex-direction: column;
    }

    .main button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }

    .main button:hover {
      background-color: #0069d9;
    }

    .ai-panel {
      width: 350px;
      background-color: #fff;
      border-left: 1px solid #ccc;
      display: flex;
      flex-direction: column;
    }

    .ai-header {
      padding: 20px;
      border-bottom: 1px solid #ccc;
    }

    .ai-header input,
    .ai-header textarea {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: inherit;
    }

    .ai-header button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .ai-header button:hover {
      background-color: #0069d9;
    }

    .ai-response {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background-color: #f9f9f9;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Tarefas</h2>
    <div id="taskList" class="task-list"></div>
    <button class="new-task-btn" onclick="createTask()">+ Nova Tarefa</button>
  </div>

  <div class="main">
    <h1 id="taskTitle">Selecione uma tarefa</h1>
    <p id="taskDescription">Aqui aparecerá a descrição da tarefa.</p>
    <div id="taskButtons" class="hidden">
      <button onclick="editTask()">Editar</button>
      <button onclick="deleteTask()" style="background-color:#dc3545">Excluir</button>
      <button onclick="toggleAI()">Abrir Chat IA</button>
    </div>
  </div>

  <div id="aiPanel" class="ai-panel hidden">
    <div class="ai-header">
      <h3>Assistente IA</h3>
      <input id="apiKey" type="password" placeholder="Sua API Key" />
      <textarea id="prompt" rows="4" placeholder="Escreva seu prompt..."></textarea>
      <button onclick="sendPrompt()">Enviar</button>
    </div>
    <div id="aiResponse" class="ai-response">Aguardando...</div>
  </div>

  <script>
    const API_BASE = "http://localhost:8080/api/tasks";
    let selectedTask = null;

    const taskListEl = document.getElementById("taskList");
    const titleEl = document.getElementById("taskTitle");
    const descEl = document.getElementById("taskDescription");
    const taskButtonsEl = document.getElementById("taskButtons");
    const aiPanelEl = document.getElementById("aiPanel");
    const responseEl = document.getElementById("aiResponse");

    // === Carrega tarefas ao iniciar ===
    async function loadTasks() {
      const res = await fetch(API_BASE);
      const tasks = await res.json();
      renderTasks(tasks);
    }

    function renderTasks(tasks) {
      taskListEl.innerHTML = "";
      tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "task-item" + (selectedTask?.id === task.id ? " active" : "");
        div.innerText = task.title;
        div.onclick = () => selectTask(task.id);
        taskListEl.appendChild(div);
      });
    }

    async function selectTask(id) {
      const res = await fetch(`${API_BASE}/${id}`);
      if (!res.ok) {
        alert("Erro ao carregar tarefa");
        return;
      }
      const task = await res.json();
      selectedTask = task;
      titleEl.innerText = task.title;
      descEl.innerText = task.description;
      taskButtonsEl.classList.remove("hidden");
      loadTasks(); // atualiza o destaque
    }

    async function createTask() {
      const title = prompt("Título da nova tarefa:");
      if (!title) return;

      const description = prompt("Descrição da tarefa:") || "";

      const res = await fetch(API_BASE, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, description })
      });

      if (res.ok) {
        loadTasks();
      } else {
        alert("Erro ao criar tarefa");
      }
    }

    async function editTask() {
      if (!selectedTask) return;

      const newTitle = prompt("Novo título:", selectedTask.title);
      if (!newTitle) return;

      const newDescription = prompt("Nova descrição:", selectedTask.description);

      const res = await fetch(`${API_BASE}/${selectedTask.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: newTitle, description: newDescription })
      });

      if (res.ok) {
        await selectTask(selectedTask.id);
        loadTasks();
      } else {
        alert("Erro ao atualizar tarefa");
      }
    }

    async function deleteTask() {
      if (!selectedTask) return;
      if (!confirm("Deseja realmente excluir esta tarefa?")) return;

      const res = await fetch(`${API_BASE}/${selectedTask.id}`, { method: "DELETE" });

      if (res.ok) {
        selectedTask = null;
        titleEl.innerText = "Selecione uma tarefa";
        descEl.innerText = "Aqui aparecerá a descrição da tarefa.";
        taskButtonsEl.classList.add("hidden");
        loadTasks();
      } else {
        alert("Erro ao excluir tarefa");
      }
    }

    function toggleAI() {
      aiPanelEl.classList.toggle("hidden");
    }

    async function sendPrompt() {
      if (!selectedTask) {
        alert("Selecione uma tarefa antes de enviar o prompt.");
        return;
      }

      const apiKey = document.getElementById("apiKey").value.trim();
      const prompt = document.getElementById("prompt").value.trim();

      if (!apiKey || !prompt) {
        alert("Informe a API key e o prompt.");
        return;
      }

      responseEl.innerText = "Enviando para o Gemini...";

      try {
        const res = await fetch(`${API_BASE}/${selectedTask.id}/ai`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ apiKey, prompt })
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error("Erro da API: " + text);
        }

        const data = await res.json();
        responseEl.innerText = data.response || "(Resposta vazia)";
      } catch (err) {
        responseEl.innerText = "Erro: " + err.message;
      }
    }

    loadTasks();
  </script>
</body>
</html>
