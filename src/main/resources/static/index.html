<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f7f7f8;
      height: 100vh;
      display: flex;
      color: #374151;
    }

    .sidebar {
      width: 260px;
      background-color: #ffffff;
      border-right: 1px solid #e5e7eb;
      padding: 24px;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
    }

    .sidebar h2 {
      margin: 0 0 20px 0;
      font-size: 20px;
      font-weight: 600;
      color: #111827;
    }

    .task-list {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .task-item {
      padding: 12px 16px;
      margin-bottom: 8px;
      background-color: #f9fafb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      font-size: 14px;
    }

    .task-item:hover {
      background-color: #f3f4f6;
      border-color: #e5e7eb;
      transform: translateY(-1px);
    }

    .task-item.active {
      background-color: #eff6ff;
      border-color: #3b82f6;
      color: #1e40af;
      font-weight: 500;
    }

    .new-task-btn {
      padding: 12px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
    }

    .new-task-btn:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(59, 130, 246, 0.4);
    }

    .main {
      flex: 1;
      background-color: #ffffff;
      padding: 32px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .main h1 {
      margin: 0 0 16px 0;
      font-size: 28px;
      font-weight: 600;
      color: #111827;
    }

    .main p {
      margin: 0 0 24px 0;
      font-size: 16px;
      line-height: 1.6;
      color: #6b7280;
    }

    .main button {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      margin-right: 12px;
      box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
    }

    .main button:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(59, 130, 246, 0.4);
    }

    .main button:last-child {
      margin-right: 0;
    }

    .ai-panel {
      width: 380px;
      background-color: #ffffff;
      border-left: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.05);
    }

    .ai-header {
      padding: 24px;
      border-bottom: 1px solid #e5e7eb;
      background-color: #fafafa;
    }

    .ai-header h3 {
      margin: 0 0 16px 0;
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }

    .ai-header input,
    .ai-header textarea {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.2s ease;
      background-color: #ffffff;
    }

    .ai-header input:focus,
    .ai-header textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .ai-header button {
      margin-top: 16px;
      padding: 12px;
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
    }

    .ai-header button:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(59, 130, 246, 0.4);
    }

    .ai-response {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background-color: #fafafa;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.6;
      color: #374151;
      border-top: 1px solid #e5e7eb;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background-color: #ffffff;
      margin: 10% auto;
      padding: 32px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      animation: modalSlideIn 0.3s ease-out;
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      color: #111827;
    }

    .close {
      color: #9ca3af;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .close:hover {
      color: #374151;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #374151;
      font-size: 14px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.2s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .modal-buttons button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .btn-cancel {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-cancel:hover {
      background: #e5e7eb;
    }

    .btn-submit {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
    }

    .btn-submit:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(59, 130, 246, 0.4);
    }

    .hidden {
      display: none !important;
    }

    /* Inputs inline na área principal */
    .inline-input, .inline-textarea {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
      transition: border-color 0.2s ease;
      background-color: #ffffff;
      color: #111827;
    }
    .inline-input:focus, .inline-textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .inline-textarea {
      resize: vertical;
      min-height: 120px;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Tarefas</h2>
    <div id="taskList" class="task-list"></div>
    <button class="new-task-btn" onclick="openModal()">+ Nova Tarefa</button>
  </div>

  <div class="main">
    <h1 id="taskTitle">Selecione uma tarefa</h1>
    <p id="taskDescription">Aqui aparecerá a descrição da tarefa.</p>
    <div id="taskButtons" class="hidden">
      <button onclick="startInlineEdit()">Editar</button>
      <button onclick="deleteTask()" style="background-color:#dc3545">Excluir</button>
      <button onclick="toggleAI()">Abrir Chat IA</button>
    </div>
  </div>

  <div id="aiPanel" class="ai-panel hidden">
    <div class="ai-header">
      <h3>Assistente IA</h3>
      <input id="apiKey" type="password" placeholder="Sua API Key" />
      <textarea id="prompt" rows="4" placeholder="Escreva seu prompt..."></textarea>
      <button id="sendPromptBtn" onclick="sendPrompt()">Enviar</button>
    </div>
    <div id="aiResponse" class="ai-response">Aguardando...</div>
  </div>

  <!-- Modal para criar nova tarefa -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Criar Nova Tarefa</h2>
        <span class="close" onclick="closeModal()">&times;</span>
      </div>
      <form id="taskForm" onsubmit="handleCreateTask(event)">
        <div class="form-group">
          <label for="newTaskTitle">Título da Tarefa</label>
          <input type="text" id="newTaskTitle" name="title" required placeholder="Digite o título da tarefa...">
        </div>
        <div class="form-group">
          <label for="newTaskDescription">Descrição</label>
          <textarea id="newTaskDescription" name="description" placeholder="Digite a descrição da tarefa (opcional)..."></textarea>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn-submit">Criar Tarefa</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:8080/api/tasks";
    let selectedTask = null;
    let isEditing = false;

    const taskListEl = document.getElementById("taskList");
    const titleEl = document.getElementById("taskTitle");
    const descEl = document.getElementById("taskDescription");
    const taskButtonsEl = document.getElementById("taskButtons");
    const aiPanelEl = document.getElementById("aiPanel");
    const responseEl = document.getElementById("aiResponse");

    // === Carrega tarefas ao iniciar ===
    async function loadTasks() {
      const res = await fetch(API_BASE);
      const tasks = await res.json();
      renderTasks(tasks);
    }

    function renderTasks(tasks) {
      taskListEl.innerHTML = "";
      tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "task-item" + (selectedTask?.id === task.id ? " active" : "");
        div.innerText = task.title;
        div.onclick = () => selectTask(task.id);
        taskListEl.appendChild(div);
      });
    }

    async function selectTask(id) {
      const res = await fetch(`${API_BASE}/${id}`);
      if (!res.ok) {
        alert("Erro ao carregar tarefa");
        return;
      }
      const task = await res.json();
      selectedTask = task;
      // Resetar modo edição se estiver ativo
      if (isEditing) {
        cancelEdit();
      }
      titleEl.innerText = task.title;
      descEl.innerText = task.description;
      taskButtonsEl.classList.remove("hidden");
      loadTasks(); // atualiza o destaque
    }

    function startInlineEdit() {
      if (!selectedTask || isEditing) return;
      isEditing = true;

      // Transformar título em input
      const titleInput = document.createElement('input');
      titleInput.id = 'editTitleInput';
      titleInput.type = 'text';
      titleInput.className = 'inline-input';
      titleInput.value = selectedTask.title || '';
      titleInput.placeholder = 'Digite o novo título...';
      titleEl.innerHTML = '';
      titleEl.appendChild(titleInput);

      // Transformar descrição em textarea
      const descInput = document.createElement('textarea');
      descInput.id = 'editDescInput';
      descInput.className = 'inline-textarea';
      descInput.value = selectedTask.description || '';
      descInput.placeholder = 'Digite a nova descrição (opcional)...';
      descEl.innerHTML = '';
      descEl.appendChild(descInput);

      // Ajustar botões para salvar/cancelar
      taskButtonsEl.innerHTML = `
        <button class="btn-submit" onclick="saveEdit()">Salvar</button>
        <button class="btn-cancel" onclick="cancelEdit()">Cancelar</button>
        <button onclick="deleteTask()" style="background-color:#dc3545">Excluir</button>
        <button onclick="toggleAI()">Abrir Chat IA</button>
      `;

      // Foco no título
      titleInput.focus();
    }

    async function saveEdit() {
      if (!isEditing || !selectedTask) return;
      const newTitle = document.getElementById('editTitleInput')?.value.trim();
      const newDescription = document.getElementById('editDescInput')?.value.trim();
      if (!newTitle) {
        alert('Por favor, insira um título.');
        return;
      }

      const res = await fetch(`${API_BASE}/${selectedTask.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: newTitle, description: newDescription || '' })
      });

      if (res.ok) {
        // Atualizar UI
        selectedTask.title = newTitle;
        selectedTask.description = newDescription || '';
        titleEl.innerText = selectedTask.title;
        descEl.innerText = selectedTask.description;
        isEditing = false;
        setDefaultTaskButtons();
        loadTasks();
      } else {
        alert('Erro ao atualizar tarefa');
      }
    }

    function cancelEdit() {
      if (!selectedTask) return;
      titleEl.innerText = selectedTask.title || 'Sem título';
      descEl.innerText = selectedTask.description || '';
      isEditing = false;
      setDefaultTaskButtons();
    }

    function setDefaultTaskButtons() {
      taskButtonsEl.innerHTML = `
        <button onclick="startInlineEdit()">Editar</button>
        <button onclick="deleteTask()" style="background-color:#dc3545">Excluir</button>
        <button onclick="toggleAI()">Abrir Chat IA</button>
      `;
    }

    async function deleteTask() {
      if (!selectedTask) return;
      if (!confirm("Deseja realmente excluir esta tarefa?")) return;

      const res = await fetch(`${API_BASE}/${selectedTask.id}`, { method: "DELETE" });

      if (res.ok) {
        selectedTask = null;
        titleEl.innerText = "Selecione uma tarefa";
        descEl.innerText = "Aqui aparecerá a descrição da tarefa.";
        taskButtonsEl.classList.add("hidden");
        loadTasks();
      } else {
        alert("Erro ao excluir tarefa");
      }
    }

    function toggleAI() {
      aiPanelEl.classList.toggle("hidden");
    }

    async function sendPrompt() {
      if (!selectedTask) {
        alert("Selecione uma tarefa antes de enviar o prompt.");
        return;
      }

      const apiKey = document.getElementById("apiKey").value.trim();
      const prompt = document.getElementById("prompt").value.trim();
      const sendBtn = document.getElementById("sendPromptBtn");

      if (!apiKey || !prompt) {
        alert("Informe a API key e o prompt.");
        return;
      }

      // Bloqueia o botão para evitar múltiplas chamadas simultâneas
      if (sendBtn) {
        sendBtn.disabled = true;
        sendBtn.textContent = "Enviando...";
      }

      responseEl.innerText = "Enviando para o Gemini...";

      // Função utilitária para aguardar
      const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      // Até 3 tentativas em caso de sobrecarga (503)
      let lastError = null;
      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          const res = await fetch(`${API_BASE}/${selectedTask.id}/ai`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ apiKey, prompt })
          });

          const text = await res.text();
          let data = null;
          try { data = JSON.parse(text); } catch {}

          // Se o backend responder 503 diretamente
          if (!res.ok) {
            if (res.status === 503 && attempt < 3) {
              responseEl.innerText = `Modelo sobrecarregado (503). Tentando novamente... [tentativa ${attempt+1}/3]`;
              await delay(500 * attempt); // backoff incremental
              continue;
            }
            throw new Error(text || `Erro HTTP ${res.status}`);
          }

          // Backend responde 200 sempre; verificar texto de erro encapsulado
          const responseText = data?.response ?? text;
          if (typeof responseText === 'string' && responseText.startsWith("Erro ao gerar a resposta: 503")) {
            if (attempt < 3) {
              responseEl.innerText = `Modelo sobrecarregado (503). Tentando novamente... [tentativa ${attempt+1}/3]`;
              await delay(500 * attempt);
              continue;
            }
            throw new Error("Modelo sobrecarregado (503). Tente novamente mais tarde.");
          }

          responseEl.innerText = responseText || "(Resposta vazia)";
          lastError = null;
          break;
        } catch (err) {
          lastError = err;
          if (attempt < 3) {
            await delay(500 * attempt);
            continue;
          }
        }
      }

      if (lastError) {
        responseEl.innerText = "Erro: " + lastError.message;
      }

      // Reabilita o botão
      if (sendBtn) {
        sendBtn.disabled = false;
        sendBtn.textContent = "Enviar";
      }
    }

    loadTasks();
  </script>

  <script>
    // Funções do Modal
    function openModal() {
      document.getElementById('taskModal').style.display = 'block';
      document.getElementById('newTaskTitle').focus();
    }

    function closeModal() {
      document.getElementById('taskModal').style.display = 'none';
      document.getElementById('taskForm').reset();
    }

    // Fechar modal ao clicar fora
    window.onclick = function(event) {
      const modal = document.getElementById('taskModal');
      if (event.target === modal) {
        closeModal();
      }
    }

    // Função para criar tarefa via modal
    async function handleCreateTask(event) {
      event.preventDefault();
      
      const title = document.getElementById('newTaskTitle').value.trim();
      const description = document.getElementById('newTaskDescription').value.trim();

      if (!title) {
        alert('Por favor, insira um título para a tarefa.');
        return;
      }

      const res = await fetch(API_BASE, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, description })
      });

      if (res.ok) {
        closeModal();
        loadTasks();
      } else {
        alert("Erro ao criar tarefa");
      }
    }
  </script>
</body>
</html>
