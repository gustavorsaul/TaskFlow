<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="css/styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Momo+Trust+Display&display=swap" rel="stylesheet">

</head>
<body>
  <header class="topbar">taskFlow</header>
  <div class="content">
    <div class="sidebar">
      <h2>Tarefas</h2>
      <div id="taskList" class="task-list"></div>
      <button class="new-task-btn" onclick="openModal()">Nova Tarefa</button>
    </div>

    <div class="main">
      <h1 id="taskTitle">Selecione uma tarefa</h1>
      <p id="taskDescription">Aqui aparecerá a descrição da tarefa.</p>
      <div id="taskButtons" class="hidden">
        <button onclick="startInlineEdit()">Editar</button>
        <button onclick="deleteTask()" style="background-color:#fea116">Excluir</button>
        <button onclick="toggleAI()">Abrir Chat IA</button>
      </div>
    </div>

    <div id="aiPanel" class="ai-panel hidden">
      <div class="ai-header">
        <h3>Assistente IA</h3>
        <input id="apiKey" type="password" placeholder="Sua API Key do Gemini" />
        <textarea id="prompt" rows="4" placeholder="Escreva seu prompt..."></textarea>
        <button id="sendPromptBtn" onclick="sendPrompt()">Enviar</button>
      </div>
      <div id="aiResponse" class="ai-response">Aguardando...</div>
    </div>
  </div>

  <div id="taskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Criar Nova Tarefa</h2>
        <span class="close" onclick="closeModal()">&times;</span>
      </div>
      <form id="taskForm" onsubmit="handleCreateTask(event)">
        <div class="form-group">
          <label for="newTaskTitle">Título da Tarefa</label>
          <input type="text" id="newTaskTitle" name="title" required placeholder="Digite o título da tarefa...">
        </div>
        <div class="form-group">
          <label for="newTaskDescription">Descrição</label>
          <textarea id="newTaskDescription" name="description" placeholder="Digite a descrição da tarefa (opcional)..."></textarea>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn-submit">Criar Tarefa</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
