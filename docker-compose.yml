version: '3.8'

services:
  # Serviço do Banco de Dados
  db:
    image: postgres:15
    container_name: taskflow-db
    environment:
      POSTGRES_DB: taskflow        # Cria o banco automaticamente
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"                # Expõe a porta para o DBeaver
    volumes:
      - postgres-taskflow-data:/var/lib/postgresql/data

  # Serviço da Aplicação
  app:
    build: .
    container_name: taskflow-app
    ports:
      - "8080:8080"                # Acesso em localhost:8080
    depends_on:
      - db
    environment:
      # Sobrescreve o application.properties para falar com o container 'db'
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/taskflow
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  postgres-taskflow-data:          # Volume persistente específico deste projeto